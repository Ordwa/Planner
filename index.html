<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flow Planner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="planner-app">
      <aside class="sidebar" aria-label="Planner navigation">
        <div class="sidebar__brand">
          <div class="sidebar__logo">FP</div>
          <div>
            <p class="sidebar__kicker">Planner Workspace</p>
            <h2>Flow Planner</h2>
          </div>
        </div>

        <nav class="sidebar__nav">
          <button class="sidebar__item is-active" type="button">Board</button>
          <button class="sidebar__item" type="button">My Tasks</button>
          <button class="sidebar__item" type="button">Reports</button>
          <button class="sidebar__item" type="button">Schedule</button>
        </nav>
      </aside>

      <div class="workspace">
        <header class="command-topbar">
          <label class="search-bar" for="search-input">
            <span class="visually-hidden">Search tasks</span>
            <input
              id="search-input"
              type="search"
              placeholder="Search activities, owners, or details..."
            />
          </label>

          <div class="command-topbar__actions">
            <div class="filters-menu">
              <button
                class="hamburger-button button button--ghost"
                id="filters-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="filters-panel"
                aria-haspopup="true"
              >
                <span class="hamburger-button__icon" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
                <span>Filters</span>
              </button>

              <div class="filters-popover" id="filters-panel" hidden>
                <div class="filters-popover__header">
                  <p class="section-label">Board filters</p>
                  <h2>Refine the board</h2>
                </div>

                <label class="field">
                  <span>Priority</span>
                  <select id="priority-filter">
                    <option value="all">All priorities</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                  </select>
                </label>

                <button
                  class="button button--ghost"
                  id="clear-filters"
                  type="button"
                >
                  Clear filters
                </button>
              </div>
            </div>

            <button
              class="button button--primary"
              id="open-task-modal"
              type="button"
            >
              Add task
            </button>
          </div>
        </header>

        <main class="workspace-main">
          <section class="board-panel" aria-labelledby="board-title">
            <div class="board-panel__header">
              <div>
                <p class="section-label">Board</p>
                <h1 id="board-title">Activities</h1>
              </div>
              <p class="board-panel__hint">
                Click a card to edit it. Drag cards between buckets on desktop.
              </p>
            </div>

            <div class="kanban-board" id="kanban-board" aria-live="polite"></div>
          </section>
        </main>
      </div>
    </div>

    <div class="task-modal" id="task-modal" hidden>
      <div class="task-modal__backdrop" data-close-modal="true"></div>

      <section
        class="task-modal__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="task-modal-title"
      >
        <div class="task-modal__header">
          <div>
            <p class="section-label">Task details</p>
            <h2 id="task-modal-title">Add task</h2>
          </div>

          <button
            class="icon-button"
            id="close-task-modal"
            type="button"
            aria-label="Close task form"
          >
            X
          </button>
        </div>

        <form id="task-form" class="task-form">
          <input type="hidden" id="task-id" />

          <label>
            Title
            <input
              id="task-title"
              name="title"
              type="text"
              placeholder="Prepare sprint planning"
              maxlength="80"
              required
            />
          </label>

          <label>
            Description
            <textarea
              id="task-description"
              name="description"
              rows="4"
              placeholder="Outline the next work items and assign owners."
              maxlength="220"
            ></textarea>
          </label>

          <div class="task-form__grid">
            <label>
              Owner
              <input
                id="task-owner"
                name="owner"
                type="text"
                placeholder="Team or person"
                maxlength="40"
              />
            </label>

            <label>
              Due date
              <input id="task-due-date" name="dueDate" type="date" />
            </label>

            <label>
              Priority
              <select id="task-priority" name="priority">
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="low">Low</option>
              </select>
            </label>

            <label>
              Status
              <select id="task-status" name="status">
                <option value="backlog">Backlog</option>
                <option value="todo">To Do</option>
                <option value="progress">In Progress</option>
                <option value="done">Done</option>
              </select>
            </label>
          </div>

          <div class="task-form__actions">
            <button class="button button--primary" type="submit" id="submit-button">
              Create task
            </button>
            <button class="button button--ghost" type="button" id="reset-button">
              Cancel
            </button>
          </div>
        </form>
      </section>
    </div>

    <template id="column-template">
      <section class="kanban-column">
        <header class="kanban-column__header">
          <div class="kanban-column__heading">
            <h3 class="kanban-column__title"></h3>
            <p class="kanban-column__subtitle"></p>
          </div>
          <div class="kanban-column__meta">
            <span class="kanban-column__count"></span>
            <span class="kanban-column__menu" aria-hidden="true">...</span>
          </div>
        </header>
        <div class="kanban-column__list"></div>
      </section>
    </template>

    <template id="task-template">
      <article class="task-card" draggable="true" tabindex="0">
        <div class="task-card__header">
          <span class="task-card__priority"></span>
          <span class="task-card__date"></span>
        </div>
        <h4 class="task-card__title"></h4>
        <p class="task-card__description"></p>
        <div class="task-card__meta"></div>
        <div class="task-card__actions"></div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
