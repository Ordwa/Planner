<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="planner-app">
      <div class="workspace">
        <header class="command-topbar">
          <div class="command-topbar__left">
            <div class="filters-menu">
              <button
                class="button button--ghost command-topbar__utility command-topbar__utility--plain"
                id="filters-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="filters-panel"
                aria-haspopup="true"
                aria-label="Filters"
                >
                  <svg
                    class="command-topbar__icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M4 6h16l-6 7v5l-4-2v-3Z" />
                  </svg>
                </button>

              <div class="filters-popover" id="filters-panel" hidden>
                <label class="field">
                  <span>Priority</span>
                  <select id="priority-filter">
                    <option value="all">All priorities</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                  </select>
                </label>

                <button
                  class="button button--ghost button--tiny"
                  id="clear-filters"
                  type="button"
                >
                  Reset
                </button>
              </div>
            </div>

            <div class="notifications-menu">
              <button
                class="button button--ghost command-topbar__utility command-topbar__utility--plain"
                id="notifications-button"
                type="button"
                aria-label="Notifications"
                aria-expanded="false"
                aria-controls="notifications-panel"
                aria-haspopup="true"
              >
                <svg
                  class="command-topbar__icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5" />
                  <path d="M9.5 20a2.5 2.5 0 0 0 5 0" />
                </svg>
                <span class="command-topbar__badge" id="notifications-badge" hidden>0</span>
              </button>

              <div class="notifications-popover" id="notifications-panel" hidden>
                <div class="notifications-popover__header">
                  <p class="section-label">Notifications</p>
                  <h2>Overdue activities</h2>
                </div>

                <div class="notifications-list" id="notifications-list"></div>
              </div>
            </div>

            <button
              class="button button--ghost command-topbar__utility command-topbar__utility--plain"
              id="notes-button"
              type="button"
              aria-label="Notes"
              aria-expanded="false"
              aria-controls="notes-drawer"
              aria-haspopup="dialog"
            >
              <svg
                class="command-topbar__icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M8 3h8l5 5v11a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z" />
                <path d="M16 3v5h5" />
                <path d="M10 13h4" />
                <path d="M10 17h4" />
              </svg>
            </button>
          </div>

          <label class="search-bar" for="search-input">
            <span class="visually-hidden">Search tasks</span>
            <input
              id="search-input"
              type="search"
              placeholder="Search activities, owners, or details..."
            />
          </label>

          <div class="board-options-menu">
            <button
              class="button button--ghost command-topbar__utility command-topbar__utility--plain"
              id="board-options-toggle"
              type="button"
              aria-label="Board options"
              aria-expanded="false"
              aria-controls="board-options-panel"
              aria-haspopup="true"
            >
              <svg
                class="command-topbar__icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="3" />
                <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.5 1.2V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.2-.5H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .5-1.2V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 16 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 .6 1 1.7 1.7 0 0 0 1.2.5H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15Z" />
              </svg>
            </button>

            <div class="board-options-popover" id="board-options-panel" hidden>
              <button type="button" id="board-new-activity">New activity</button>
              <button type="button" id="export-board">Export Excel</button>
              <button type="button" id="import-board">Import Excel</button>
            </div>
            <input
              class="visually-hidden"
              id="import-board-input"
              type="file"
              accept=".csv,text/csv"
            />
          </div>
        </header>

        <main class="workspace-main">
          <section class="board-panel" aria-labelledby="board-title">
            <h1 class="visually-hidden" id="board-title">Planner</h1>

            <div class="kanban-board" id="kanban-board" aria-live="polite"></div>
          </section>
        </main>
      </div>
    </div>

    <div class="notes-drawer" id="notes-drawer" hidden>
      <div class="notes-drawer__backdrop" data-close-notes="true"></div>

      <section
        class="notes-drawer__panel"
        role="dialog"
        aria-modal="true"
        aria-label="Notes"
      >
        <div class="notes-drawer__header">
          <div>
            <p class="section-label">Notes</p>
          </div>

          <button
            class="icon-button"
            id="close-notes-drawer"
            type="button"
            data-close-notes="true"
            aria-label="Close notes drawer"
          >
            X
          </button>
        </div>

        <div class="notes-drawer__body">
          <div class="notes-toolbar" role="toolbar" aria-label="Notes formatting">
            <button class="button button--ghost notes-toolbar__button" type="button" data-note-command="bold" aria-label="Bold">
              B
            </button>
            <button class="button button--ghost notes-toolbar__button notes-toolbar__button--italic" type="button" data-note-command="italic" aria-label="Italic">
              I
            </button>
            <button class="button button--ghost notes-toolbar__button notes-toolbar__button--underline" type="button" data-note-command="underline" aria-label="Underline">
              U
            </button>
            <button class="button button--ghost notes-toolbar__button" type="button" data-note-command="heading" aria-label="Heading">
              H
            </button>
            <button class="button button--ghost notes-toolbar__button" type="button" data-note-command="bulletList" aria-label="Bullet list">
              <svg class="notes-toolbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                <circle cx="5" cy="7" r="1.5" fill="currentColor" stroke="none"></circle>
                <circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"></circle>
                <circle cx="5" cy="17" r="1.5" fill="currentColor" stroke="none"></circle>
                <path d="M10 7h9"></path>
                <path d="M10 12h9"></path>
                <path d="M10 17h9"></path>
              </svg>
            </button>
            <button class="button button--ghost notes-toolbar__button" type="button" data-note-command="numberList" aria-label="Numbered list">
              <svg class="notes-toolbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                <path d="M4 7h2v4"></path>
                <path d="M3.5 11h3"></path>
                <path d="M4 15h3l-3 3h3"></path>
                <path d="M10 7h9"></path>
                <path d="M10 12h9"></path>
                <path d="M10 17h9"></path>
              </svg>
            </button>
            <button class="button button--ghost notes-toolbar__button" type="button" data-note-command="checklist" aria-label="Checklist item">
              ☑
            </button>
            <button class="button button--ghost notes-toolbar__button" type="button" data-note-command="quote" aria-label="Quote">
              "
            </button>
          </div>

          <div
            class="notes-drawer__editor"
            id="notes-editor"
            contenteditable="true"
            role="textbox"
            aria-multiline="true"
            data-placeholder="Start writing..."
          ></div>
        </div>
      </section>
    </div>

    <div class="task-modal" id="task-modal" hidden>
      <div class="task-modal__backdrop" data-close-modal="true"></div>

      <section
        class="task-modal__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="task-modal-title"
      >
        <div class="task-modal__header">
          <div>
            <h2
              id="task-modal-title"
              class="task-modal__editable-title"
              contenteditable="true"
              role="textbox"
              aria-label="Activity title"
              data-placeholder="New Activity"
            >New Activity</h2>
          </div>
          <span class="owner-avatar task-modal__owner" id="task-owner-avatar" title="Owner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <path d="M20 21a8 8 0 0 0-16 0" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </span>
        </div>

        <form id="task-form" class="task-form">
          <input type="hidden" id="task-id" />

          <label class="visually-hidden">
            Title
            <input
              id="task-title"
              name="title"
              type="text"
              placeholder="Prepare sprint planning"
              maxlength="80"
              required
            />
          </label>

          <label class="task-form__label--plain">
            Description
            <textarea
              id="task-description"
              name="description"
              rows="4"
              placeholder="Outline the next work items and assign owners."
            ></textarea>
          </label>

          <div class="task-form__grid">
            <label class="task-form__label--plain">
              Priority
              <select id="task-priority" name="priority">
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="low">Low</option>
              </select>
            </label>

            <label class="task-form__label--plain">
              Due date
              <input id="task-due-date" name="dueDate" type="date" />
            </label>
          </div>

          <section class="task-form__section" aria-labelledby="checklist-title">
            <div class="task-form__section-header">
              <div>
                <h3 id="checklist-title">Task</h3>
              </div>
              <label class="task-form__toggle" for="show-checklist-on-card">
                <input id="show-checklist-on-card" type="checkbox" />
                <span>Show in card</span>
              </label>
            </div>

            <div class="inline-entry">
              <input
                id="checklist-input"
                type="text"
                placeholder="Add Task"
                maxlength="120"
              />
              <button
                class="button button--ghost"
                id="add-checklist-item"
                type="button"
              >
                +
              </button>
            </div>

            <div class="checklist-list" id="checklist-list"></div>
          </section>

          <section class="task-form__section" aria-labelledby="links-title">
            <div class="task-form__section-header">
              <div>
                <h3 id="links-title">Link</h3>
              </div>
            </div>

            <div class="link-entry">
              <input
                id="link-title-input"
                type="text"
                placeholder="Label"
                maxlength="80"
              />
              <input
                id="link-url-input"
                type="url"
                placeholder="https://example.com"
              />
              <button
                class="button button--ghost"
                id="add-link"
                type="button"
              >
                +
              </button>
            </div>

            <div class="links-list" id="links-list"></div>
          </section>

          <section class="task-form__section" aria-labelledby="comments-title">
            <div class="task-form__section-header">
              <div>
                <h3 id="comments-title">Log</h3>
              </div>
            </div>

            <div class="comment-entry">
              <textarea
                id="comment-input"
                rows="3"
                placeholder="Add an update or note for this activity"
              ></textarea>
              <button
                class="button button--ghost"
                id="add-comment"
                type="button"
              >
                Add Log
              </button>
            </div>

            <div class="comments-list" id="comments-list"></div>
          </section>

          <div class="task-form__actions">
            <button class="button button--primary" type="submit" id="submit-button">
              Create task
            </button>
            <button class="button button--ghost" type="button" id="reset-button">
              Cancel
            </button>
          </div>
        </form>
      </section>
    </div>

    <template id="column-template">
      <section class="kanban-column">
        <header class="kanban-column__header">
          <div class="kanban-column__heading">
            <span class="kanban-column__count"></span>
            <h3 class="kanban-column__title"></h3>
          </div>
          <div class="kanban-column__meta">
            <div class="kanban-column__menu">
              <button
                class="button button--ghost button--tiny kanban-column__menu-toggle"
                type="button"
                aria-expanded="false"
                aria-label="Column sort options"
              >
                ...
              </button>
              <div class="kanban-column__dropdown" hidden>
                <button type="button" data-sort="manual">Manual order</button>
                <button type="button" data-sort="newest">Newest first</button>
                <button type="button" data-sort="oldest">Oldest first</button>
                <button type="button" data-sort="dueDate">Due date</button>
                <button type="button" data-sort="priority">Priority</button>
              </div>
            </div>
          </div>
        </header>
        <div class="kanban-column__list"></div>
      </section>
    </template>

    <template id="task-template">
      <article class="task-card" draggable="true" tabindex="0">
        <h4 class="task-card__title"></h4>
        <div class="task-card__meta"></div>
        <div class="task-card__owner"></div>
        <div class="task-card__actions"></div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
